<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="=viewport" content="width=device-width, initial-scale=1.0">
        <title>User Login | CACLHA CWD</title>
        <link rel="stylesheet" href="wrktr-app2.css">
        
    </head>
    <body>
        <div class="header-div">

            <p>
                <img id="logo" src="cac.png" width="25%">
            </p>

            <h1 id="login-h1"> Login to your Account</h1>
            <p id="login-p1">Dear User, enter your details to access your account</p>

            <form id="wrktr-login-form">
            <input class="inputs" id="uemail" type="email" placeholder="Email">
            <div class="password-container">
                <input id="upassword" class="inputs" type="password" placeholder="Password">
                <span id="toggle-password" class="eye">👁</span>
            </div>
            
            <button class="submit-btn" id="login-btn" type="submit">Login</button> 
            </form>

            <p><a id= "forgot-password" href="wrktr-forgotpassword-full.html">Forgot Password</a></p>

            <p id="login-msg"> New User? <a href="wrktr-signup-full.html" id="signup-link"><span id="span2">Create an account</span></a><br>
            
            </p>


        </div>

        <a href="wrktr-bot.html">
            <button id="chat-btn">💬 Chat</button>
        </a>
        
        
    <script src="wrktr-login-full.js"></script>

</footer>
    
    </body>
</html>
