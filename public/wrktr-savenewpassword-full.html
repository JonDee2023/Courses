<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="=viewport" content="width=device-width, initial-scale=1.0">
        <title>Forgot Password | CACLHA CWD</title>
        <link rel="stylesheet" href="wrktr-app2.css">
    </head>

    <body>

        <div class="header-div3">
            <img id="logo" src="cac.png" width="30%">
            
            <form id="save-new-password">
                <input class="inputs" id="verified-email" type="email" placeholder="Re-enter registered email">

                <!--input class="inputs" id="new-password" type="password" placeholder="Enter new password">

                <input class="inputs" id="confirm-password" type="password" placeholder="Confirm new password"-->
                
                <div class="password-container">
                    <input id="new-password" class="inputs" type="password" placeholder="Enter new password" required>
                    <span id="toggle-password" class="eye">👁</span>
                </div>

                <div class="password-container">
                    <input id="confirm-password" class="inputs" type="password" placeholder="Confirm new password" required>
                    <span id="toggles-password" class="eye">👁</span>
                </div>
                
            

                <button id="spwrd-btn" type="submit">Save Password</button>
            </form>


         </div>



    <script src="wrktr-savenewpassword-full.js"></script>

    </body>
</html>
